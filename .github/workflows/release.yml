name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: ""
      dry_run:
        description: Build artifacts without publishing a release
        required: false
        type: boolean
        default: false
      release_type:
        description: Release type for manual runs
        required: true
        type: choice
        default: prerelease
        options:
          - prerelease
          - release
          - auto
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      bin_names: ${{ steps.version.outputs.bin_names }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_body: ${{ steps.version.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          METADATA="$(cargo metadata --no-deps --format-version 1)"
          VERSION="$(echo "$METADATA" | jq -r '.packages[] | select(.name == "howlto") | .version')"
          BIN_NAMES="$(echo "$METADATA" | jq -r '[.packages[] | select(.name == "howlto") | .targets[] | select(.kind | index("bin")) | .name] | unique | join(" ")')"

          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'auto' }}"
          REQUESTED_REF="${{ github.event.inputs.ref }}"

          if [ "$EVENT_NAME" = "push" ]; then
            RELEASE_TAG="$REF_NAME"
          elif [ "$RELEASE_TYPE" = "release" ]; then
            RELEASE_TAG="v$VERSION"
          elif [ "$RELEASE_TYPE" = "prerelease" ]; then
            RELEASE_TAG="v$VERSION-pre"
          elif [[ "$REQUESTED_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${REQUESTED_REF#refs/tags/}"
          elif [[ "$REQUESTED_REF" == v* ]]; then
            RELEASE_TAG="$REQUESTED_REF"
          else
            RELEASE_TAG="v$VERSION-pre"
          fi

          TAG_VERSION="${RELEASE_TAG#v}"
          TAG_VERSION="${TAG_VERSION%%-*}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match Cargo version $VERSION" >&2
            exit 1
          fi

          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE=true
            MAKE_LATEST=false
            RELEASE_NAME="Pre-release $RELEASE_TAG"
          else
            PRERELEASE=false
            MAKE_LATEST=true
            RELEASE_NAME="Release $RELEASE_TAG"
          fi

          BUILD_SHA="$(git rev-parse HEAD)"
          RELEASE_BODY_DELIMITER="RELEASE_BODY_${BUILD_SHA}_EOF"
          TAG_NOTES_FILE="$(mktemp)"
          TAG_OBJECT_TYPE="$(git for-each-ref --count=1 "refs/tags/$RELEASE_TAG" --format="%(objecttype)")"
          if [ "$TAG_OBJECT_TYPE" = "tag" ]; then
            git for-each-ref --count=1 "refs/tags/$RELEASE_TAG" --format="%(contents)" > "$TAG_NOTES_FILE"
          fi

          echo "bin_names=$BIN_NAMES" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<$RELEASE_BODY_DELIMITER"
            echo "Automated build from \`$BUILD_SHA\`."
            echo
            echo "Version: \`$VERSION\`"
            echo "Run: \`${{ github.run_number }}\`"
            if [ -s "$TAG_NOTES_FILE" ]; then
              echo
              echo "Tag notes:"
              echo
              cat "$TAG_NOTES_FILE"
            fi
            echo "$RELEASE_BODY_DELIMITER"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-gnu
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package_os: linux
            package_arch: x86_64-gnu
          - label: linux-x86_64-musl
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            package_os: linux
            package_arch: x86_64-musl
          - label: linux-aarch64-gnu
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            package_os: linux
            package_arch: aarch64-gnu
          - label: linux-aarch64-musl
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            package_os: linux
            package_arch: aarch64-musl
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            package_os: macos
            package_arch: x86_64
          - label: macos-aarch64
            runner: macos-15
            target: aarch64-apple-darwin
            package_os: macos
            package_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-rust
          shared-key: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        run: pip install cargo-zigbuild

      - name: Install Zig
        if: runner.os == 'Linux'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build bins with Zig
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --bins --target ${{ matrix.target }}

      - name: Build bins
        if: runner.os != 'Linux'
        run: cargo build --release --bins --target ${{ matrix.target }}

      - name: Ad-hoc sign macOS bins
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN_NAMES="${{ needs.metadata.outputs.bin_names }}"
          RELEASE_DIR="target/${{ matrix.target }}/release"

          for BIN_NAME in $BIN_NAMES; do
            codesign --force --sign - "$RELEASE_DIR/$BIN_NAME"
          done

      - name: Package bins
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.metadata.outputs.version }}"
          BIN_NAMES="${{ needs.metadata.outputs.bin_names }}"
          PACKAGE="howlto-${{ matrix.package_os }}-${{ matrix.package_arch }}-$VERSION"
          RELEASE_DIR="target/${{ matrix.target }}/release"

          mkdir -p "$PACKAGE"
          for BIN_NAME in $BIN_NAMES; do
            cp "$RELEASE_DIR/$BIN_NAME" "$PACKAGE/"
          done

          tar -czf "$PACKAGE.tar.gz" "$PACKAGE"
          echo "asset=$PACKAGE.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: howlto-${{ matrix.package_os }}-${{ matrix.package_arch }}-${{ needs.metadata.outputs.version }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: ${{ needs.metadata.outputs.release_name }}
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          make_latest: ${{ needs.metadata.outputs.make_latest }}
          overwrite_files: true
          generate_release_notes: true
          body: ${{ needs.metadata.outputs.release_body }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
